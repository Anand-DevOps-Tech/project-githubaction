name: CI/CD Pipeline 
# triggers the workflow on push to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # step 1: Compile and test job
  compile:
    name: Compile and test java project
    runs-on: self-hosted
    steps:
    # Check out the repository
    - uses: actions/checkout@v4
    #setup JDK 17 and maven dependencies
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    # Compile the project using Maven
    - name: Compile with Maven
      run: mvn test
  # step 2: Security scan job
  security-scan:
    name: run security scan
    runs-on: self-hosted
    needs: compile
    steps:
    # check out the repository
    - uses: actions/checkout@v4
    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install trivy -y
    # Run Trivy security scan
    - name: Trivy FS scan 
      run: trivy fs --format table -o fs-report.txt . 
    - name: upload scan report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-fs-report 
        path: fs-report.txt
  # step 3: Build and sonar scan job
  build_project_and_sonar_scan:
    runs-on: self-hosted
    needs: security-scan
    steps:
    # check out the repository
    - uses: actions/checkout@v4
    #setup JDK 17 and maven dependencies
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    # Build the project using Maven
    - name: Build with Maven
      run: mvn package
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
    # sonar qube scan
    - uses: actions/checkout@v4
      with:
          fetch-depth: 0
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.1.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  build_docker_image_push_to_dockerhub:
    runs-on: self-hosted
    needs: build_project_and_sonar_scan
    steps:
    - uses: actions/checkout@v4
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: anand1590/bankapp:latest
        file: ./Dockerfile
  deploy_to_dockercompose:
    runs-on: self-hosted
    needs: build_docker_image_push_to_dockerhub
    steps:
    - uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: pull latest image
      run: docker pull anand1590/bankapp:latest
    - name: Deploy with Docker Compose
      run: |
        docker-compose down
        docker-compose up -d
